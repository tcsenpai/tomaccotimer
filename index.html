<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tomacco Timer</title>
<style>
  :root { --bg:#1a1a2e; --fg:#eee; --accent:#e94560; --break:#16c79a; }
  * { box-sizing:border-box; margin:0; }
  body {
    font-family:system-ui,sans-serif; color:var(--fg);
    background:linear-gradient(135deg,#2a1a4e 0%,#1a1a2e 45%,#3a1c5c 100%);
    background-attachment:fixed;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:1.5rem; padding:1rem; text-align:center;
  }
  h1 { font-size:1.4rem; opacity:.7; font-weight:500; }
  #time { font-size:clamp(3rem,18vw,7rem); font-variant-numeric:tabular-nums; font-weight:700; }
  #label { font-size:1rem; opacity:.6; text-transform:uppercase; letter-spacing:.15em; }
  #earned { font-size:.95rem; opacity:.75; color:var(--break); font-variant-numeric:tabular-nums;
    visibility:hidden; }
  #earned.show { visibility:visible; }
  #stage { display:flex; flex-direction:column; align-items:center; gap:.6rem; }
  .btns { display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; }
  button {
    font-size:1.1rem; padding:.7rem 1.6rem; border:none; border-radius:999px;
    background:var(--accent); color:#fff; cursor:pointer; font-weight:600;
  }
  button:disabled { opacity:.35; cursor:default; }
  button.ghost { background:transparent; border:1px solid #ffffff33; }
  .ratio { display:flex; align-items:center; gap:.5rem; font-size:.9rem; opacity:.7; }
  .ratio input { width:3.5rem; padding:.3rem; border-radius:6px; border:1px solid #ffffff33;
    background:transparent; color:var(--fg); text-align:center; }
  body.breaking { --accent:var(--break); }
  body.breaking #time { color:var(--break); }
</style>
</head>
<body>
  <h1>Tomacco Timer 🍅</h1>
  <div id="stage">
    <div id="label">ready</div>
    <div id="time">00:00</div>
    <div id="earned">break earned: 00:00</div>
  </div>
  <div class="btns">
    <button id="main">Start working</button>
    <button id="reset" class="ghost" disabled>Reset</button>
    <button id="pip" class="ghost" hidden>Pop out</button>
  </div>
  <label class="ratio">
    Break = worked time ÷
    <input id="ratio" type="number" min="1" step="1" value="5">
  </label>

<script>
// States: idle -> working -> resting -> idle
const $ = id => document.getElementById(id);
const timeEl=$('time'), labelEl=$('label'), mainBtn=$('main'), resetBtn=$('reset'), ratioEl=$('ratio'), earnedEl=$('earned');

let state='idle';
let startMs=0;          // when current phase started (perf clock, monotonic)
let earnedSec=0;        // break seconds granted when resting starts
let tick=null;

const now = () => performance.now();

function fmt(sec){
  sec=Math.max(0,Math.round(sec));
  const m=Math.floor(sec/60), s=sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function render(){
  syncPip();
  if(state==='working'){
    const worked=(now()-startMs)/1000;
    timeEl.textContent=fmt(worked);
    const ratio=Math.max(1,parseFloat(ratioEl.value)||5);
    earnedEl.textContent='break earned: '+fmt(worked/ratio);
  } else if(state==='resting'){
    const left=earnedSec-(now()-startMs)/1000;
    if(left<=0){ finishBreak(); return; }
    timeEl.textContent=fmt(left);
  }
}

function startWork(){
  if('Notification'in window && Notification.permission==='default') Notification.requestPermission();
  state='working'; startMs=now(); earnedSec=0;
  document.body.classList.remove('breaking');
  labelEl.textContent='working';
  mainBtn.textContent='Stop & take break';
  resetBtn.disabled=false;
  earnedEl.classList.add('show');
  render();
  tick=setInterval(render,250);
}

function startBreak(){
  const workedSec=(now()-startMs)/1000;
  const ratio=Math.max(1,parseFloat(ratioEl.value)||5);
  earnedSec=workedSec/ratio;
  if(earnedSec<1){ finishBreak(); return; }   // ponytail: too little worked, nothing to rest
  state='resting'; startMs=now();
  earnedEl.classList.remove('show');
  document.body.classList.add('breaking');
  labelEl.textContent='break — '+fmt(earnedSec)+' earned';
  mainBtn.textContent='Skip break';
  render();
}

function finishBreak(){
  clearInterval(tick); tick=null;
  document.body.classList.remove('breaking');
  earnedEl.classList.remove('show');
  state='idle';
  if(pipWin) pipWin.document.body.className=document.body.className;
  labelEl.textContent='break done — go again';
  timeEl.textContent='00:00';
  mainBtn.textContent='Start working';
  resetBtn.disabled=true;
  try{ beep(); }catch(e){}
  if('Notification'in window && Notification.permission==='granted')
    new Notification('Tomacco 🍅',{body:'Break finished. Back to work!'});
}

function reset(){
  clearInterval(tick); tick=null;
  state='idle';
  document.body.classList.remove('breaking');
  earnedEl.classList.remove('show');
  labelEl.textContent='ready';
  timeEl.textContent='00:00';
  mainBtn.textContent='Start working';
  resetBtn.disabled=true;
}

function beep(){
  const ac=new AudioContext(), o=ac.createOscillator(), g=ac.createGain();
  o.connect(g); g.connect(ac.destination); o.frequency.value=660;
  g.gain.setValueAtTime(.2,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.4);
  o.start(); o.stop(ac.currentTime+.4);
}

// Document Picture-in-Picture (Chromium 116+, https/localhost only)
const stage=$('stage'), pipBtn=$('pip');
let pipWin=null;
if('documentPictureInPicture'in window) pipBtn.hidden=false;

async function togglePip(){
  if(pipWin){ pipWin.close(); return; }
  pipWin=await documentPictureInPicture.requestWindow({width:280,height:180});
  // copy styles into pip document
  for(const sheet of document.styleSheets){
    try{
      const css=[...sheet.cssRules].map(r=>r.cssText).join('');
      const s=pipWin.document.createElement('style'); s.textContent=css;
      pipWin.document.head.appendChild(s);
    }catch(e){}
  }
  pipWin.document.body.style.cssText='background:linear-gradient(135deg,#2a1a4e,#1a1a2e,#3a1c5c);'+
    'color:#eee;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;';
  pipWin.document.body.className=document.body.className;
  pipWin.document.body.append(stage);       // move live nodes into pip
  pipBtn.textContent='Pop in';
  pipWin.addEventListener('pagehide',()=>{   // fires on close (button or system)
    document.querySelector('h1').after(stage); // put stage back after title
    pipBtn.textContent='Pop out'; pipWin=null;
  });
}
// keep pip body class in sync with break color
const syncPip=()=>{ if(pipWin) pipWin.document.body.className=document.body.className; };
pipBtn.onclick=togglePip;

mainBtn.onclick=()=>{
  if(state==='idle') startWork();
  else if(state==='working') startBreak();
  else if(state==='resting') finishBreak(); // skip
};
resetBtn.onclick=reset;
</script>
</body>
</html>
